services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy
    container_name: toxiproxy
    command: ["-host=0.0.0.0"]
    ports:
      - "8474:8474"   # Toxiproxy REST API
      - "8666:8666"   # Proxied S3 endpoint (slow path)

  toxiproxy-bootstrap:
    image: curlimages/curl:8.10.1
    depends_on:
      toxiproxy:
        condition: service_started
    environment:
      TOXIPROXY_HOST: toxiproxy:8474
      TOXIPROXY_LISTEN: 0.0.0.0:8666
      TOXIPROXY_UPSTREAM: minio:9000
      TOXIC_LATENCY_MS: 400
      TOXIC_JITTER_MS: 120
      TOXIC_BANDWIDTH_BPS: 50000
      TOXIPROXY_NAME: minio_s3
    volumes:
      - ./scripts/bootstrap-toxiproxy.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_BUCKET: ${S3_BUCKET_NAME:-media}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio-bootstrap:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_BUCKET: ${S3_BUCKET_NAME:-media}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb -p local/$${MINIO_BUCKET} || true;
        mc anonymous set download local/$${MINIO_BUCKET} || true;
      "
    restart: "no"

volumes:
  minio-data:
    driver: local

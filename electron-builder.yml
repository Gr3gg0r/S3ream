appId: com.hulesa.app
productName: hulesa
copyright: Copyright © 2025 Shahfiq Shah
directories:
  output: release/${version}
  buildResources: build
afterPack: scripts/prune-platform-binaries.cjs
files:
  - dist/**/*
  - "!dist/**/*.map"
  - node_modules/**/*
  - package.json
extraMetadata:
  main: dist/main/index.js
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
